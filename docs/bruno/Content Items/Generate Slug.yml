info:
  name: Generate Slug
  type: http
  seq: 5

http:
  method: POST
  url: "{{BASE_URL}}/api/v1/content/slug"
  body:
    type: json
    data: |-
      {
        "title": "My First Content"
      }
  auth:
    type: bearer
    token: "{{TOKEN}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
