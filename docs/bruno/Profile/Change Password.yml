info:
  name: Change Password
  type: http
  seq: 5

http:
  method: PUT
  url: "{{BASE_URL}}/api/profile/password"
  body:
    type: json
    data: |-
      {
        "currentPassword": "{{USER_PASSWORD}}",
        "newPassword": "{{USER_PASSWORD_NEW}}"
      }
  auth:
    type: bearer
    token: "{{TOKEN}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
