info:
  name: Mark as Spam
  type: http
  seq: 6

http:
  method: POST
  url: "{{BASE_URL}}/api/admin/users/{{USER_ID}}/mark-spam"
  body:
    type: json
    data: |-
      {
        "confirmed": true
      }
  auth:
    type: bearer
    token: "{{TOKEN}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
