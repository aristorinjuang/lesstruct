info:
  name: List Contents
  type: http
  seq: 1

http:
  method: GET
  url: "{{BASE_URL}}/api/v1/content_items?limit=10&offset=0"
  params:
    - name: limit
      value: "10"
      type: query
    - name: offset
      value: "0"
      type: query
  auth:
    type: bearer
    token: "{{TOKEN}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
