# Lesstruct Configuration
# ======================
# This file is generated by merging all TOML files in config/.
# Edit the individual files in config/, then regenerate config.toml.

# ── Languages ───────────────────────────────────────────────────────
# HTML ISO language codes for i18n support.
# The first entry is the primary language (default for admin panel and content site).
languages = ["en"]

# ── User Profile Fields ─────────────────────────────────────────────
# Global user profile fields — custom fields for user-editable metadata,
# system fields for internal-only metadata (read-only in admin panel).
# Uses the same field types and validation rules as post type fields.
[user_fields]
fields = [
  { name = "Job Title", slug = "job_title", type = "text" },
  { name = "Company", slug = "company", type = "text" },
  { name = "Website", slug = "website", type = "text" },
]
system_fields = [
  { name = "Internal Rating", slug = "internal_rating", type = "select", options = ["bronze", "silver", "gold", "platinum"] },
]

# ── Custom Post Types ───────────────────────────────────────────────
# Define custom post types and their fields below.
# This file is loaded at startup. If it doesn't exist, default post types are used.
#
# Post type slug format: kebab-case (e.g., menu-item, team-member)
# Field slug format: snake_case (e.g., available_from, max_servings)
#
# Supported field types:
#   text      - Single-line text input
#   textarea  - Multi-line text area (supports max_length)
#   number    - Numeric input (supports min, max)
#   date      - Date picker
#   select    - Dropdown select (requires options list)
#   checkbox  - Boolean toggle
#
# Field categories:
#   fields         - Custom fields (user-editable via admin panel)
#   system_fields  - System fields (internal metadata, read-only in admin panel)

# Example: Restaurant Menu Item
[[post_type]]
name = "Menu Item"
slug = "menu-item"
description = "Restaurant menu items"
supports = ["title", "content", "featured_image"]

[[post_type.fields]]
name = "Price"
slug = "price"
type = "number"
min = 0.0
max = 99999.99
required = true

[[post_type.fields]]
name = "Description"
slug = "description"
type = "textarea"
max_length = 500

[[post_type.fields]]
name = "Servings"
slug = "servings"
type = "number"
min = 1
max = 20
required = true

[[post_type.fields]]
name = "Available From"
slug = "available_from"
type = "date"

[[post_type.fields]]
name = "Category"
slug = "category"
type = "select"
options = ["Pastry", "Bread", "Cake", "Drink"]
required = true

[[post_type.fields]]
name = "Available"
slug = "available"
type = "checkbox"

[[post_type.fields]]
name = "Featured"
slug = "featured"
type = "checkbox"

[[post_type.system_fields]]
name = "Internal SKU"
slug = "internal_sku"
type = "text"

[[post_type.system_fields]]
name = "Sync Status"
slug = "sync_status"
type = "select"
options = ["pending", "synced", "failed"]

# Example: Team Member
[[post_type]]
name = "Team Member"
slug = "team-member"
description = "Team member profiles"
supports = ["title", "content", "featured_image"]

[[post_type.fields]]
name = "Role"
slug = "role"
type = "text"
required = true

[[post_type.fields]]
name = "Email"
slug = "email"
type = "text"

[[post_type.fields]]
name = "Bio"
slug = "bio"
type = "textarea"
max_length = 1000

# ── Thumbnail Sizes ─────────────────────────────────────────────────
# Thumbnail size configuration for media processing.
# Each [[thumbnail]] entry defines a max_width (integer > 0) and a suffix (unique, starts with _).
# If no thumbnails are defined, a single default is used: { max_width = 370, suffix = "_thumb" }.
[[thumbnail]]
max_width = 370
suffix = "_thumb"

[[thumbnail]]
max_width = 800
suffix = "_medium"

[[thumbnail]]
max_width = 1600
suffix = "_large"
