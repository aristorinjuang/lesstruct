info:
  name: Change Email
  type: http
  seq: 3

http:
  method: PUT
  url: "{{BASE_URL}}/api/profile/email"
  body:
    type: json
    data: |-
      {
        "newEmail": "{{USER_EMAIL}}",
        "currentPassword": "{{USER_PASSWORD}}"
      }
  auth:
    type: bearer
    token: "{{TOKEN}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
