info:
  name: Login Admin
  type: http
  seq: 4

http:
  method: POST
  url: "{{BASE_URL}}/api/auth/login"
  body:
    type: json
    data: |-
      {
        "username": "admin",
        "password": "{{PASSWORD}}"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        if (res.body.data?.token) {
          // Extract a token from the JSON response body
          const token = res.body.data.token

          // Save it as an environemnt variable
          bru.setEnvVar("TOKEN", token)
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
